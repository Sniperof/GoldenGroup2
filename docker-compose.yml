name: golden-crm

services:

  # ── Application ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy-net        # visible to nginx-server
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      replicas: 3

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: golden-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-golden_crm}
      POSTGRES_USER:     ${POSTGRES_USER:-golden}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal         # internal only — not reachable from nginx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-golden} -d ${POSTGRES_DB:-golden_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  uploads:

networks:
  internal:
    driver: bridge
  proxy-net:
    external: true       # created by nginx-server's docker-compose
