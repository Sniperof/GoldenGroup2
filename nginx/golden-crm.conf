# Golden CRM — nginx server block
# Add this file to your nginx-server container's sites config,
# then reload: docker exec nginx-server nginx -s reload

server {
    listen 80;
    server_name crm.yourdomain.com;     # <-- change to your domain

    client_max_body_size 150m;

    # Gzip for API responses and frontend assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        proxy_pass         http://localhost:3880;   # <-- match APP_PORT in .env
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
