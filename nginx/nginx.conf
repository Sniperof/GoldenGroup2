events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip for API responses and frontend assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Connection pool to the app container
    upstream app {
        server app:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Raise body limit to match multer's 150 MB cap
        client_max_body_size 150m;

        # ── Uploaded files — served directly from the shared volume ──────
        # Bypasses Node.js entirely; add immutable cache for hashed names.
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── API & tRPC ────────────────────────────────────────────────────
        location ~ ^/(api|trpc)/ {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Frontend SPA + everything else ────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
