<svg viewBox="0 0 520 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Golden Group unified operations">
  <defs>
    <linearGradient id="gg-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="gg-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <style>
      @keyframes gg-flow  { to { stroke-dashoffset: 8; } }
      @keyframes gg-orbit { to { stroke-dashoffset: -100; } }
      @keyframes gg-bob   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      @keyframes gg-pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      @keyframes gg-breathe { 0%,100% { opacity: .9; } 50% { opacity: .55; } }

      .gg-lines path { animation: gg-flow 1s linear infinite; }
      .gg-orbit { animation: gg-orbit 30s linear infinite; }
      .gg-sat { animation: gg-bob 4.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .gg-sat-2 { animation-delay: .55s; }
      .gg-sat-3 { animation-delay: 1.1s; }
      .gg-sat-4 { animation-delay: 1.65s; }
      .gg-accent { animation: gg-pulse 3s ease-in-out infinite; }
      .gg-accent-2 { animation-delay: 1.5s; }
      .gg-trend { animation: gg-breathe 3.5s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        .gg-lines path, .gg-orbit, .gg-sat, .gg-accent, .gg-trend { animation: none; }
      }
    </style>
  </defs>

  <!-- soft backdrop -->
  <circle cx="260" cy="200" r="150" fill="#ffffff" fill-opacity="0.04"/>
  <ellipse class="gg-orbit" cx="260" cy="200" rx="196" ry="150" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="3 7"/>

  <!-- connection lines -->
  <g class="gg-lines" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.6" stroke-dasharray="2 6" stroke-linecap="round">
    <path d="M180 168 L120 100"/>
    <path d="M340 168 L400 100"/>
    <path d="M180 250 L120 300"/>
    <path d="M340 250 L400 300"/>
  </g>

  <!-- central dashboard card -->
  <rect x="172" y="150" width="176" height="112" rx="16" fill="url(#gg-card)" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="190" cy="170" r="3.5" fill="url(#gg-gold)"/>
  <circle cx="202" cy="170" r="3.5" fill="#ffffff" fill-opacity="0.55"/>
  <circle cx="214" cy="170" r="3.5" fill="#ffffff" fill-opacity="0.55"/>
  <!-- chart bars -->
  <g>
    <rect x="192" y="218" width="14" height="26" rx="3" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="214" y="202" width="14" height="42" rx="3" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="236" y="210" width="14" height="34" rx="3" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="258" y="190" width="14" height="54" rx="3" fill="url(#gg-gold)"/>
    <rect x="280" y="206" width="14" height="38" rx="3" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="302" y="222" width="14" height="22" rx="3" fill="#ffffff" fill-opacity="0.55"/>
  </g>
  <!-- trend line -->
  <path class="gg-trend" d="M192 214 L214 198 L236 206 L258 186 L280 200 L316 192" fill="none" stroke="url(#gg-gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- satellite: branch (location) top-left -->
  <g class="gg-sat">
    <rect x="92" y="72" width="56" height="56" rx="15" fill="url(#gg-card)" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.5"/>
    <path d="M120 88 L106 100 L106 114 L134 114 L134 100 Z" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M116 114 L116 104 L124 104 L124 114" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="142" cy="78" r="4" fill="url(#gg-gold)"/>
  </g>

  <!-- satellite: client/team top-right -->
  <g class="gg-sat gg-sat-2">
    <rect x="372" y="72" width="56" height="56" rx="15" fill="url(#gg-card)" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.5"/>
    <circle cx="400" cy="93" r="7.5" fill="none" stroke="#ffffff" stroke-width="2.2"/>
    <path d="M387 114 Q400 100 413 114" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="422" cy="78" r="4" fill="url(#gg-gold)"/>
  </g>

  <!-- satellite: device (router) bottom-left -->
  <g class="gg-sat gg-sat-3">
    <rect x="92" y="272" width="56" height="56" rx="15" fill="url(#gg-card)" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.5"/>
    <rect x="106" y="306" width="28" height="12" rx="3" fill="none" stroke="#ffffff" stroke-width="2.2"/>
    <path d="M113 306 L111 294 M127 306 L129 294" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="111" cy="290" r="1.8" fill="#ffffff"/>
    <circle cx="129" cy="290" r="1.8" fill="url(#gg-gold)"/>
    <circle cx="142" cy="278" r="4" fill="url(#gg-gold)"/>
  </g>

  <!-- satellite: contract/pin bottom-right -->
  <g class="gg-sat gg-sat-4">
    <rect x="372" y="272" width="56" height="56" rx="15" fill="url(#gg-card)" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.5"/>
    <path d="M400 290 C390 290 390 304 400 318 C410 304 410 290 400 290 Z" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="400" cy="300" r="4" fill="url(#gg-gold)"/>
    <circle cx="422" cy="278" r="4" fill="url(#gg-gold)"/>
  </g>

  <!-- floating accents -->
  <circle class="gg-accent" cx="250" cy="64" r="2.6" fill="#ffffff" fill-opacity="0.5"/>
  <circle class="gg-accent gg-accent-2" cx="270" cy="338" r="2.6" fill="#ffffff" fill-opacity="0.5"/>
  <circle class="gg-accent" cx="60" cy="200" r="3" fill="url(#gg-gold)" fill-opacity="0.8"/>
  <circle class="gg-accent gg-accent-2" cx="460" cy="200" r="3" fill="url(#gg-gold)" fill-opacity="0.8"/>
</svg>
